{% extends "base.html" %}

{% block title %}Deletar Carro · Vetor Multimarcas{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16">
  <div class="bg-white rounded-xl shadow-md p-8 text-center">
    <div class="mx-auto w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mb-4">
      <svg class="w-7 h-7 text-danger" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <h1 class="text-xl font-bold text-gray-800 mb-2">Deletar Carro</h1>
    <p class="text-gray-600 mb-6">
      Tem certeza que deseja deletar o carro<br>
      <strong class="text-gray-800">{{ object.brand }} {{ object.model }}</strong>?
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="flex flex-wrap justify-center gap-3">
        <button type="submit" class="bg-danger hover:bg-danger-hover text-white font-medium px-6 py-2.5 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-danger focus:ring-offset-2">
          Sim, deletar
        </button>
        <a href="{% url 'car_update' pk=object.pk %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-6 py-2.5 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
