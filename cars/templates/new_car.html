{% extends 'base.html' %}

{% block content %}
    <h1>Adicionar Novo Carro</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <input type="submit" value="Cadastrar Carro" class="btn btn-primary">
    </form>
{% endblock %}
